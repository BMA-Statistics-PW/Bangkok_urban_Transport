name: Update Transport CSV Data

on:
  schedule:
    # Every Monday at 01:00 UTC
    - cron: '0 1 * * 1'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-transport-csv
  cancel-in-progress: false

jobs:
  refresh-csv:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Refresh local CSV files
        run: |
          set -euo pipefail
          chmod +x scripts/update_transport_csv.sh
          ./scripts/update_transport_csv.sh

      - name: Run dashboard sanity checks
        run: |
          set -euo pipefail
          node scripts/sanity_check_dashboard_template.mjs

      - name: Commit and push if data changed
        run: |
          set -euo pipefail

          if git diff --quiet -- dashboard-template/data/transport_share.csv dashboard-template/data/transport_report.csv dashboard-template/data/transport_metadata.json; then
            echo "No CSV changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add dashboard-template/data/transport_share.csv dashboard-template/data/transport_report.csv dashboard-template/data/transport_metadata.json
          git commit -m "chore(data): weekly update transport CSV files"

          # Rebase with latest remote to reduce push failures when main moved
          git pull --rebase origin "${GITHUB_REF_NAME}"
          git push